name: ACEMAGIC S1 Status
version: "1.0.6"
slug: acemagic_s1_status
description: Affiche Home Assistant OK avec CPU et RAM sur l'ecran LCD ACEMAGIC S1
url: https://github.com/Yeoh37/ha-acemagic-s1-display
arch:
  - amd64
startup: services
boot: auto
init: false
privileged:
  - SYS_RAWIO
  - SYS_ADMIN
full_access: true
devices:
  - /dev/hidraw0
  - /dev/hidraw1
options:
  refresh_seconds: 10
  hidraw_device: /dev/hidraw1
  orientation: landscape
  backend: hidraw
  packet_mode: auto
schema:
  refresh_seconds: int
  hidraw_device: str
  orientation: list(landscape|portrait)
  backend: list(hidraw)
  packet_mode: list(auto|raw4104|report4105|short64)
