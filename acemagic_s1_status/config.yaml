name: ACEMAGIC S1 Status
version: "1.0.7"
slug: acemagic_s1_status
description: Affiche Home Assistant OK avec CPU et RAM sur lecran LCD ACEMAGIC S1
url: https://github.com/Yeoh37/ha-acemagic-s1-display
arch:
  - amd64
startup: services
boot: auto
init: false
privileged:
  - SYS_RAWIO
  - SYS_ADMIN
full_access: true
devices:
  - /dev/hidraw0
  - /dev/hidraw1
options:
  refresh_seconds: 10
  hidraw_device: /dev/hidraw1
  orientation: landscape
  packet_mode: ht32_auto
schema:
  refresh_seconds: int
  hidraw_device: str
  orientation: list(landscape|portrait)
  packet_mode: list(ht32_auto|ht32_a3|ht32_f1f2_a3|diagnostic)
